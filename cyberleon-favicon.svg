<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6c76b"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a07c2a"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141413"/>
      <stop offset="100%" stop-color="#09090a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg-grad)"/>

  <!-- Subtle border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- C letter - elegant serif-style -->
  <!-- Outer arc of C -->
  <path d="M21.5 9.5
             C21.5 9.5 19 8 16 8
             C11.3 8 7.5 11.6 7.5 16
             C7.5 20.4 11.3 24 16 24
             C19 24 21.5 22.5 21.5 22.5"
        fill="none"
        stroke="url(#gold)"
        stroke-width="2.4"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Top serif horizontal bar of C -->
  <line x1="18.5" y1="9.5" x2="21.5" y2="9.5"
        stroke="url(#gold)" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Bottom serif horizontal bar of C -->
  <line x1="18.5" y1="22.5" x2="21.5" y2="22.5"
        stroke="url(#gold)" stroke-width="2.4" stroke-linecap="round"/>

  <!-- L letter - positioned inside/overlapping -->
  <line x1="20" y1="11" x2="20" y2="21"
        stroke="#e6c76b" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="20" y1="21" x2="24" y2="21"
        stroke="#e6c76b" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Center dot accent -->
  <circle cx="16" cy="16" r="1.2" fill="#c9a84c" opacity="0.6"/>
</svg>
